<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post Waste - W2REP</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="top-title">
      <div class="logo">♻️</div>
      <h1>Post Waste</h1>
    </div>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="seller-dashboard.html">Dashboard</a>
      <a class="active" href="seller-post-waste.html">Post Waste</a>
      <a href="seller-my-posts.html">My Posts</a>
      <a href="#" onclick="logout()">Logout</a>
    </nav>
  </header>

  <!-- FORM SECTION -->
  <section class="hero">

    <div class="form-card premium-form">

      <h2>📦 Add New Waste Item</h2>
      <p>Fill up the details to list your waste for buyers</p>

      <form id="sellerPostForm">

        <div class="form-group">
          <label>Waste Name</label>
          <input id="postName" type="text" placeholder="e.g. Plastic Bottle" required />
        </div>

        <div class="form-grid-2">

          <div class="form-group">
            <label>Type</label>
            <input id="postType" type="text" placeholder="Plastic / Paper / Metal" required />
          </div>

          <div class="form-group">
            <label>Quantity (kg)</label>
            <input id="postQuantity" type="number" min="1" placeholder="100" required />
          </div>

        </div>

        <div class="form-group">
          <label>Location</label>
          <input id="postLocation" type="text" placeholder="Dhaka" required />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="postDescription" rows="4" placeholder="Write short details..."></textarea>
        </div>

        <div class="form-group">
          <label>Photo (optional)</label>
          <input id="postImage" type="file" accept="image/jpeg,image/png,image/webp,image/gif" />
          <small style="color:#666;">A real photo helps buyers trust your listing. Max 5MB.</small>
          <div id="imagePreviewWrap" style="display:none; margin-top:10px;">
            <img id="imagePreview" alt="Preview" style="max-width:200px; max-height:200px; border-radius:8px; border:1px solid #ccc;" />
          </div>
        </div>

        <button type="submit" class="btn">🚀 Post Waste</button>

      </form>

      <!-- MESSAGE -->
      <p id="msg" style="margin-top:10px;font-weight:bold;"></p>

    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer">
    2026 Waste to Resource Exchange Platform
  </footer>

</div>

<!-- JS -->
<script src="config.js"></script>
<script src="app.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const user = getCurrentUser();

  if (!user || user.role !== "seller") {
    window.location.href = "login.html";
    return;
  }
});

/* Live preview of the chosen photo before upload */
document.getElementById("postImage").addEventListener("change", (e) => {
  const file = e.target.files[0];
  const wrap = document.getElementById("imagePreviewWrap");
  const img = document.getElementById("imagePreview");

  if (!file) {
    wrap.style.display = "none";
    return;
  }

  const reader = new FileReader();
  reader.onload = (ev) => {
    img.src = ev.target.result;
    wrap.style.display = "block";
  };
  reader.readAsDataURL(file);
});

document.getElementById("sellerPostForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const msg = document.getElementById("msg");

  const user = getCurrentUser();

  if (!user) {
    msg.style.color = "red";
    msg.innerText = "❌ Please login first!";
    return;
  }

  // multipart/form-data so the image file can travel with the rest of the fields
  const formData = new FormData();
  formData.append("name", document.getElementById("postName").value);
  formData.append("type", document.getElementById("postType").value);
  formData.append("quantity", document.getElementById("postQuantity").value);
  formData.append("location", document.getElementById("postLocation").value);
  formData.append("description", document.getElementById("postDescription").value);

  const imageFile = document.getElementById("postImage").files[0];
  if (imageFile) {
    formData.append("image", imageFile);
  }

  try {
    // NOTE: don't set Content-Type manually for FormData —
    // the browser needs to add its own multipart boundary.
    const res = await authFetch(`${API_BASE_URL}/waste/post`, {
      method: "POST",
      body: formData
    });

    const text = await res.text();

    let result;
    try {
      result = JSON.parse(text);
    } catch (e) {
      console.log("SERVER RESPONSE NOT JSON:", text);
      msg.style.color = "red";
      msg.innerText = "❌ Server error (invalid response)";
      return;
    }

    if (res.ok) {
      msg.style.color = "green";
      msg.innerText = "✅ Waste posted successfully! Redirecting...";

      setTimeout(() => {
        window.location.href = "seller-my-posts.html";
      }, 1200);

    } else {
      msg.style.color = "red";
      msg.innerText = result.message || "❌ Post failed!";
    }

  } catch (err) {
    console.log(err);
    msg.style.color = "red";
    msg.innerText = "❌ Backend not reachable (check server)";
  }
});
</script>

</body>
</html>
