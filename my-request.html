<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Requests - W2REP</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="top-title">
      <div class="logo">♻️</div>
      <h1>My Requests</h1>
    </div>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>
      <a href="waste-listing.html">Waste Listing</a>
      <a class="active" href="my-request.html">My Requests</a>
      <a href="buyer-dashboard.html">Dashboard</a>
    </nav>
  </header>

  <!-- MAIN -->
  <section class="hero">

    <div class="premium-card">

      <!-- CARD HEADER -->
      <div class="card-header">
        <div>
          <h2>📦 Request History</h2>
          <p>Track all your waste exchange requests in one place</p>
        </div>
      </div>

      <!-- TABLE -->
      <table class="premium-table">

        <thead>
          <tr>
            <th>Waste</th>
            <th>Quantity</th>
            <th>Location</th>
            <th>Status</th>
            <th>Delivery</th>
            <th>Date</th>
            <th>Chat</th>
          </tr>
        </thead>

        <tbody id="requestsTableBody">
          <tr>
            <td colspan="7" class="empty-state">
              No requests yet
            </td>
          </tr>
        </tbody>

      </table>

    </div>

  </section>

</div>

<script src="config.js"></script>
<script src="app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const user = getCurrentUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  if (user.role !== "buyer") {
    alert("Buyer account die login koro!");
    window.location.href = "login.html";
    return;
  }

  loadMyRequests(user.id);
});

async function loadMyRequests(buyerId) {
  try {
    const res = await authFetch(`${API_BASE_URL}/requests/buyer/${buyerId}`);
    const data = await res.json();

    const tbody = document.getElementById("requestsTableBody");

    if (!data || data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No requests yet</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(r => {
      const date = new Date(r.created_at).toLocaleDateString();
      return `
        <tr>
          <td>${escapeHTML(r.waste_name)}</td>
          <td>${escapeHTML(r.quantity)}</td>
          <td>${escapeHTML(r.location || '-')}</td>
          <td><span class="status ${escapeHTML(r.status)}">${escapeHTML(r.status)}</span></td>
          <td>${renderDeliveryCell(r)}</td>
          <td>${escapeHTML(date)}</td>
          <td>
            <button class="chat-btn" onclick="window.location.href='chat.html?request_id=${r.id}&otherName=${encodeURIComponent(r.seller_name)}'">
              💬 Chat
            </button>
          </td>
        </tr>
      `;
    }).join('');

  } catch (err) {
    console.log("My requests error:", err);
  }
}

/* =========================
DELIVERY CELL (buyer side)
========================= */
function renderDeliveryCell(r) {
  if (r.status !== 'accepted' && r.status !== 'completed') {
    return `<span style="color:#999;">-</span>`;
  }

  if (!r.delivery_id) {
    return `<span style="color:#b8860b;">⏳ Awaiting seller</span>`;
  }

  const methodLabel = r.delivery_method === 'pickup' ? '🧍 Pickup' : '🚐 Delivery';
  const dateLabel = r.scheduled_date ? new Date(r.scheduled_date).toLocaleDateString() : '-';

  let extra = `
    <div style="font-size:12px; color:#555; margin-top:4px;">
      ${methodLabel} · ${dateLabel}
    </div>
  `;

  if (r.delivery_method === 'seller_delivery' && r.delivery_person_name) {
    extra += `<div style="font-size:12px; color:#555;">👤 ${escapeHTML(r.delivery_person_name)} (${escapeHTML(r.delivery_person_phone || '-')})</div>`;
  }

  // Buyer can self-confirm pickup once seller marks it scheduled/out for pickup
  if (r.delivery_method === 'pickup' && r.delivery_status === 'scheduled') {
    extra += `
      <button class="schedule-confirm-btn" style="margin-top:6px;"
        onclick="confirmPickup(${r.delivery_id})">
        ✅ Confirm Pickup
      </button>
    `;
  }

  return `
    <span class="status ${escapeHTML(r.delivery_status)}">${escapeHTML((r.delivery_status || '').replace('_',' '))}</span>
    ${extra}
  `;
}

async function confirmPickup(deliveryId) {
  try {
    const res = await authFetch(`${API_BASE_URL}/deliveries/${deliveryId}/status`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "delivered" })
    });

    if (!res.ok) {
      alert("Update failed");
      return;
    }

    const user = getCurrentUser();
    loadMyRequests(user.id);

  } catch (err) {
    console.log("Confirm pickup error:", err);
    alert("Server error");
  }
}
</script>

</body>
</html>
